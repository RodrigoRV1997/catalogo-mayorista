<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Market | Pedido en caja</title>
  <link rel="preload" href="../imagenes/logo-family-market.png?v=20260723-carrito" as="image">
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --line: #dfe7f0;
      --accent: #075fae;
      --accent-dark: #034a8a;
      --accent-soft: #e8f3ff;
      --danger: #b31222;
      --danger-soft: #fff0f2;
      --success: #087a52;
      --success-soft: #e9f8f2;
      --warning: #92400e;
      --warning-soft: #fff7ed;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(180deg, #f8fbff 0, #f4f6f8 320px);
    }

    button,
    input {
      min-height: 44px;
      border: 1px solid #c9d5e3;
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
    }

    button {
      padding: 0 14px;
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    input {
      width: 100%;
      padding: 0 12px;
    }

    button:focus-visible,
    input:focus {
      outline: 3px solid rgba(7, 95, 174, .18);
      outline-offset: 2px;
    }

    header {
      border-bottom: 5px solid #e11d2e;
      background: linear-gradient(135deg, #064f93 0%, #0873c7 68%, #0b8bc8 100%);
      color: #ffffff;
    }

    .wrap {
      width: min(920px, calc(100% - 28px));
      margin: 0 auto;
    }

    .top {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      padding: 14px 0;
    }

    .logo {
      width: 72px;
      height: 72px;
      border: 2px solid rgba(255, 255, 255, .9);
      border-radius: 50%;
      object-fit: cover;
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 3px;
      font-size: 25px;
    }

    .subtitle {
      color: #d9ecff;
      font-size: 13px;
      font-weight: 800;
    }

    main {
      display: grid;
      gap: 14px;
      padding: 18px 0 32px;
    }

    .scan-panel,
    .order-panel,
    .empty-panel,
    .message {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 10px 26px rgba(15, 23, 42, .08);
    }

    .scan-panel {
      display: grid;
      gap: 8px;
      padding: 14px;
    }

    .scan-panel label {
      font-size: 13px;
      font-weight: 800;
    }

    .scan-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .empty-panel {
      padding: 30px 18px;
      color: var(--muted);
      text-align: center;
    }

    .empty-panel strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 18px;
    }

    .message {
      padding: 12px 14px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
    }

    .message.success {
      border-color: #b8ead7;
      background: var(--success-soft);
      color: var(--success);
    }

    .message.warning {
      border-color: #fed7aa;
      background: var(--warning-soft);
      color: var(--warning);
    }

    .message.error {
      border-color: #fecdd3;
      background: var(--danger-soft);
      color: var(--danger);
    }

    .order-panel {
      overflow: hidden;
    }

    .order-heading {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .order-heading h2 {
      margin-bottom: 5px;
      font-size: 21px;
    }

    .order-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .status-badge {
      display: inline-flex;
      min-height: 30px;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .lines {
      display: grid;
    }

    .line {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 13px 16px;
      border-bottom: 1px solid var(--line);
    }

    .quantity {
      display: grid;
      width: 52px;
      min-height: 42px;
      place-items: center;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-size: 16px;
      font-weight: 900;
    }

    .line-name {
      margin-bottom: 4px;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .line-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .line-price {
      min-width: 110px;
      text-align: right;
    }

    .line-price strong {
      display: block;
      color: var(--danger);
      font-size: 16px;
    }

    .line-price span {
      color: var(--muted);
      font-size: 11px;
    }

    .changed {
      display: inline-block;
      margin-top: 4px;
      color: var(--warning);
      font-size: 11px;
      font-weight: 800;
    }

    .order-footer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 16px;
      background: #f8fafc;
    }

    .total-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .total {
      display: block;
      margin-top: 3px;
      color: var(--danger);
      font-size: 30px;
      line-height: 1;
    }

    .secondary-button {
      border-color: #cbd5e1;
      background: #ffffff;
      color: #334155;
    }

    .secondary-button:hover {
      background: #eef2f7;
      color: var(--text);
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 560px) {
      .wrap {
        width: min(100% - 18px, 920px);
      }

      .top {
        grid-template-columns: 58px minmax(0, 1fr);
        gap: 10px;
        padding: 9px 0;
      }

      .logo {
        width: 58px;
        height: 58px;
      }

      h1 {
        font-size: 20px;
      }

      main {
        padding-top: 10px;
      }

      .scan-row {
        grid-template-columns: 1fr;
      }

      .order-heading {
        grid-template-columns: 1fr;
      }

      .status-badge {
        justify-self: start;
      }

      .line {
        grid-template-columns: 46px minmax(0, 1fr);
        gap: 9px;
        padding: 11px;
      }

      .quantity {
        width: 44px;
      }

      .line-price {
        grid-column: 2;
        min-width: 0;
        text-align: left;
      }

      .order-footer {
        grid-template-columns: 1fr;
      }

      .total {
        font-size: 27px;
      }
    }

    @media print {
      body {
        background: #ffffff;
      }

      header,
      .scan-panel,
      .message,
      .secondary-button {
        display: none !important;
      }

      .wrap {
        width: 100%;
      }

      main {
        padding: 0;
      }

      .order-panel {
        border: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <img class="logo" src="../imagenes/logo-family-market.png?v=20260723-carrito" alt="Family Market" width="72" height="72">
      <div>
        <h1>Pedido en caja</h1>
        <div class="subtitle">Family Market · Catalogo mayorista</div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <form class="scan-panel" id="scanForm">
      <label for="orderInput">Escanea o pega el enlace del pedido</label>
      <div class="scan-row">
        <input id="orderInput" type="text" inputmode="url" autocomplete="off" placeholder="El lector QR puede escribir aqui">
        <button type="submit">Abrir pedido</button>
      </div>
    </form>

    <div class="message" id="message" hidden></div>

    <section class="empty-panel" id="emptyPanel">
      <strong>Esperando un pedido</strong>
      Escanea con este dispositivo el QR que muestra el cliente. Tambien puedes usar un lector QR conectado al computador.
    </section>

    <section class="order-panel" id="orderPanel" hidden>
      <div class="order-heading">
        <div>
          <h2 id="orderId">Pedido</h2>
          <div class="order-meta">
            <span id="customer"></span>
            <span id="createdAt"></span>
          </div>
        </div>
        <span class="status-badge" id="verificationStatus">Leyendo pedido...</span>
      </div>
      <div class="lines" id="orderLines"></div>
      <div class="order-footer">
        <div>
          <div class="total-label">Total del pedido</div>
          <strong class="total" id="orderTotal">$0</strong>
        </div>
        <button class="secondary-button" type="button" id="printOrder">Imprimir pedido</button>
      </div>
    </section>
  </main>

  <script>
    const CONFIG = {
      sheetCsvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLP-04AuRY6WWp2OA-cDUbaE8QI0MernPPzPviid_uY59R2TDdGX09rTXVG7V3Ug/pub?output=csv",
    };

    const moneyFormatter = new Intl.NumberFormat("es-CL", {
      style: "currency",
      currency: "CLP",
      maximumFractionDigits: 0,
    });

    const elements = {
      scanForm: document.querySelector("#scanForm"),
      orderInput: document.querySelector("#orderInput"),
      message: document.querySelector("#message"),
      emptyPanel: document.querySelector("#emptyPanel"),
      orderPanel: document.querySelector("#orderPanel"),
      orderId: document.querySelector("#orderId"),
      customer: document.querySelector("#customer"),
      createdAt: document.querySelector("#createdAt"),
      verificationStatus: document.querySelector("#verificationStatus"),
      orderLines: document.querySelector("#orderLines"),
      orderTotal: document.querySelector("#orderTotal"),
      printOrder: document.querySelector("#printOrder"),
    };

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let value = "";
      let insideQuotes = false;

      for (let index = 0; index < text.length; index += 1) {
        const char = text[index];
        const next = text[index + 1];
        if (char === '"' && insideQuotes && next === '"') {
          value += '"';
          index += 1;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && next === "\n") index += 1;
          row.push(value);
          rows.push(row);
          row = [];
          value = "";
        } else {
          value += char;
        }
      }

      if (value || row.length) {
        row.push(value);
        rows.push(row);
      }
      return rows.filter((csvRow) => csvRow.some((cell) => cell.trim()));
    }

    function normalizeText(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function normalizeHeader(value) {
      return normalizeText(value).replace(/[^a-z0-9]/g, "");
    }

    function cleanText(value) {
      return String(value || "").replace(/\s+/g, " ").trim();
    }

    function getValue(record, aliases) {
      for (const alias of aliases) {
        const key = Object.keys(record).find((candidate) => normalizeHeader(candidate) === normalizeHeader(alias));
        if (key) return record[key].trim();
      }
      return "";
    }

    function parseNumber(value) {
      const clean = String(value || "")
        .replace(/\$/g, "")
        .replace(/\s/g, "")
        .replace(/\./g, "")
        .replace(/,/g, ".");
      const number = Number(clean);
      return Number.isFinite(number) ? number : 0;
    }

    function firstPositive(values) {
      for (const value of values) {
        const number = parseNumber(value);
        if (number > 0) return number;
      }
      return 0;
    }

    function findHeaderRow(rows) {
      const expected = ["CODIGO", "NOMBRE", "MARCA", "ENVASE", "STOCK", "P. BRUTO", "P. BOLETA", "P.CAJA"];
      let bestIndex = 0;
      let bestScore = 0;
      rows.forEach((row, index) => {
        const normalizedCells = row.map(normalizeHeader);
        const score = expected.reduce((total, header) => (
          total + (normalizedCells.includes(normalizeHeader(header)) ? 1 : 0)
        ), 0);
        if (score > bestScore) {
          bestIndex = index;
          bestScore = score;
        }
      });
      return bestScore >= 2 ? bestIndex : 0;
    }

    function createProductId(code, productName, family, packageType, rowIndex) {
      const identity = [code, productName, family, packageType].map(normalizeText).join("|");
      return `p-${hashText(identity || String(rowIndex))}`;
    }

    function hashText(value) {
      let hash = 2166136261;
      const text = String(value || "");
      for (let index = 0; index < text.length; index += 1) {
        hash ^= text.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return (hash >>> 0).toString(36);
    }

    function toCatalog(csvText) {
      const rows = parseCsv(csvText);
      const headerIndex = findHeaderRow(rows);
      const headers = rows[headerIndex] || [];
      return rows.slice(headerIndex + 1).map((row, rowIndex) => {
        const record = Object.fromEntries(headers.map((header, index) => [header, row[index] || ""]));
        const code = cleanText(getValue(record, ["Codigo", "CODIGO", "COD"]));
        const productName = cleanText(getValue(record, ["NOMBRE", "Producto", "Descripcion", "Descripcion Producto"]));
        const packageType = cleanText(getValue(record, ["ENVASE", "Envase"]));
        const family = cleanText(getValue(record, ["NOMBRE FAMILIA", "Familia", "Categoria", "Categoria Producto"]));
        const stockRaw = getValue(record, ["Stock", "STOCK", "Existencia", "Existencias", "Disponible", "Disponibles", "Saldo", "Inventario", "Cantidad Stock", "Bodega"]);
        return {
          id: createProductId(code, productName, family, packageType, rowIndex),
          code,
          name: productName,
          packageType,
          stock: stockRaw === "" ? null : parseNumber(stockRaw),
          total: firstPositive([
            getValue(record, ["P.CAJA", "$ X CAJA", "Total", "Total Caja", "Valor Caja"]),
            getValue(record, ["P. BOLETA", "P BOLETA", "Precio Boleta"]),
            getValue(record, ["P. BRUTO", "P BRUTO", "Precio Bruto", "Precio"]),
          ]),
        };
      }).filter((product) => (product.code || product.name) && product.total > 0);
    }

    function base64UrlToBytes(value) {
      const base64 = value.replace(/-/g, "+").replace(/_/g, "/");
      const padded = base64 + "=".repeat((4 - (base64.length % 4)) % 4);
      const binary = atob(padded);
      return Uint8Array.from(binary, (char) => char.charCodeAt(0));
    }

    async function decodeOrder(token) {
      const [format, encoded] = String(token || "").split(".", 2);
      if (!encoded || !["g", "j"].includes(format)) throw new Error("Formato de pedido desconocido.");
      let bytes = base64UrlToBytes(encoded);
      if (format === "g") {
        if (!("DecompressionStream" in window)) throw new Error("Este navegador no puede abrir pedidos comprimidos.");
        const decompressed = await new Response(
          new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip")),
        ).arrayBuffer();
        bytes = new Uint8Array(decompressed);
      }
      const payload = JSON.parse(new TextDecoder().decode(bytes));
      if (payload.v !== 1 || !Array.isArray(payload.i)) throw new Error("El pedido no tiene un formato valido.");
      return payload;
    }

    function readToken(value) {
      const input = String(value || "").trim();
      if (!input) return "";
      if (input.startsWith("g.") || input.startsWith("j.")) return input;
      try {
        const url = new URL(input, window.location.href);
        return new URLSearchParams(url.hash.replace(/^#/, "")).get("pedido") || "";
      } catch {
        return "";
      }
    }

    function fallbackLines(payload) {
      return payload.i.map((item) => ({
        id: item[0],
        code: item[1],
        name: item[2],
        quantity: Math.max(1, Math.min(99, Number(item[3]) || 1)),
        total: Math.max(0, Number(item[4]) || 0),
        available: null,
        verified: false,
        changed: false,
      }));
    }

    function renderOrder(payload, lines, verification) {
      const createdAt = new Date(payload.t);
      elements.orderId.textContent = payload.o || "Pedido Family Market";
      elements.customer.textContent = payload.c ? `Cliente: ${payload.c}` : "Cliente sin referencia";
      elements.createdAt.textContent = Number.isFinite(createdAt.getTime())
        ? `Creado: ${createdAt.toLocaleString("es-CL")}`
        : "";
      elements.verificationStatus.textContent = verification;
      elements.orderLines.replaceChildren(...lines.map(orderLine));
      elements.orderTotal.textContent = formatMoney(lines.reduce((sum, line) => sum + (line.total * line.quantity), 0));
      elements.emptyPanel.hidden = true;
      elements.orderPanel.hidden = false;
    }

    function orderLine(line) {
      const element = document.createElement("div");
      element.className = "line";
      const status = line.available === false
        ? '<span class="changed">Sin stock en la planilla</span>'
        : line.changed
          ? '<span class="changed">Precio actualizado en caja</span>'
          : !line.verified
            ? '<span class="changed">Precio sin verificar</span>'
            : "";
      element.innerHTML = `
        <div class="quantity">${line.quantity}x</div>
        <div>
          <div class="line-name">${escapeHtml(line.name)}</div>
          <div class="line-meta">${line.code ? `Codigo ${escapeHtml(line.code)}` : "Sin codigo"}</div>
          ${status}
        </div>
        <div class="line-price">
          <strong>${formatMoney(line.total * line.quantity)}</strong>
          <span>${formatMoney(line.total)} por envase</span>
        </div>
      `;
      return element;
    }

    function showMessage(text, type = "") {
      elements.message.textContent = text;
      elements.message.className = `message ${type}`.trim();
      elements.message.hidden = !text;
    }

    async function verifyOrder(payload, fallback) {
      showMessage("Validando precios y stock con la planilla...", "");
      try {
        const separator = CONFIG.sheetCsvUrl.includes("?") ? "&" : "?";
        const response = await fetch(`${CONFIG.sheetCsvUrl}${separator}_=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`No se pudo leer la planilla (${response.status}).`);
        const catalog = toCatalog(await response.text());
        const productsById = new Map(catalog.map((product) => [product.id, product]));
        let missing = 0;
        let changed = 0;
        let unavailable = 0;
        const verifiedLines = fallback.map((line) => {
          const current = productsById.get(line.id);
          if (!current) {
            missing += 1;
            return line;
          }
          const priceChanged = current.total !== line.total;
          if (priceChanged) changed += 1;
          if (current.stock !== null && current.stock <= 0) unavailable += 1;
          return {
            ...line,
            code: current.code,
            name: current.name,
            total: current.total,
            available: current.stock === null ? null : current.stock > 0,
            verified: true,
            changed: priceChanged,
          };
        });

        renderOrder(payload, verifiedLines, missing ? "Verificacion parcial" : "Precios verificados");
        if (missing || changed || unavailable) {
          const notes = [];
          if (changed) notes.push(`${changed} precio${changed === 1 ? " cambio" : "s cambiaron"}`);
          if (unavailable) notes.push(`${unavailable} producto${unavailable === 1 ? " esta" : "s estan"} sin stock`);
          if (missing) notes.push(`${missing} producto${missing === 1 ? " no se encontro" : "s no se encontraron"}`);
          showMessage(`Revisa el pedido: ${notes.join(", ")}.`, "warning");
        } else {
          showMessage("", "");
        }
      } catch (error) {
        console.error(error);
        renderOrder(payload, fallback, "Sin verificar");
        showMessage("No se pudo consultar la planilla. Los valores mostrados son los que vio el cliente al generar el QR; confirma el total en caja.", "warning");
      }
    }

    async function openOrder(token) {
      showMessage("", "");
      try {
        const payload = await decodeOrder(token);
        const lines = fallbackLines(payload);
        renderOrder(payload, lines, "Validando...");

        if (Date.now() - Number(payload.t) > 12 * 60 * 60 * 1000) {
          showMessage("Este pedido fue creado hace mas de 12 horas. Confirma todos los precios antes de cobrar.", "warning");
        }
        await verifyOrder(payload, lines);
      } catch (error) {
        console.error(error);
        elements.orderPanel.hidden = true;
        elements.emptyPanel.hidden = false;
        showMessage("El QR no contiene un pedido valido. Pide al cliente que genere uno nuevo.", "error");
      }
    }

    function formatMoney(value) {
      return Number(value) > 0 ? moneyFormatter.format(value) : "$0";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    elements.scanForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const token = readToken(elements.orderInput.value);
      if (!token) {
        showMessage("No se encontro un pedido en el enlace ingresado.", "error");
        return;
      }
      window.location.hash = `pedido=${token}`;
      openOrder(token);
    });
    elements.printOrder.addEventListener("click", () => window.print());
    window.addEventListener("hashchange", () => {
      const token = readToken(window.location.href);
      if (token) openOrder(token);
    });

    const initialToken = readToken(window.location.href);
    if (initialToken) openOrder(initialToken);
  </script>
</body>
</html>
